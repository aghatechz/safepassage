name: Build & Deploy SafePassage

# CI/CD pipeline (diagram: Developer -> Git -> GitHub Actions -> deploy -> instance refresh)
# On every push to the default branch:
#   1. Build the React/Vite frontend
#   2. Bundle backend source + built frontend into app.tar.gz
#   3. Upload the bundle to S3 (the same object the EC2 instances pull on boot)
#   4. Trigger a rolling ASG instance refresh so every instance picks up the new build
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID       - deploy IAM user's access key
#   AWS_SECRET_ACCESS_KEY   - deploy IAM user's secret key

on:
  push:
    branches: [main, master]
  workflow_dispatch: {} # allows the manual "Run workflow" button

env:
  AWS_REGION: us-east-1
  S3_BUCKET: safepassage-dev-assets-b5026054
  S3_KEY: deploy/app-latest.tar.gz
  ASG_NAME: safepassage-dev-asg

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Assemble deployment bundle
        run: |
          set -euxo pipefail
          rm -rf stage && mkdir -p stage/backend stage/frontend-dist
          rsync -a --exclude 'node_modules' --exclude '.env' --exclude '*.log' --exclude 'uploads/*' backend/ stage/backend/
          cp -r frontend/dist/. stage/frontend-dist/
          tar -czf app.tar.gz -C stage .
          echo "Bundle contents:"; tar -tzf app.tar.gz | head -20 || true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload bundle to S3
        run: aws s3 cp app.tar.gz "s3://${S3_BUCKET}/${S3_KEY}"

      # Start a rolling refresh. If one is already running that is NOT an error:
      # the new bundle rolls out with it. Only a genuine failure fails this step.
      - name: Trigger rolling deployment (ASG instance refresh)
        run: |
          out=$(aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME" --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":150}' 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ "$rc" = "0" ]; then
            echo "Refresh started - new instances will pull the latest bundle from S3."
          elif echo "$out" | grep -q "InstanceRefreshInProgress"; then
            echo "A refresh is already in progress - fine, the latest bundle rolls out with it. Treating as success."
          else
            echo "Real error above."; exit 1
          fi
